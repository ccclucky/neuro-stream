# NeuroStream GraphQL Schema

enum PaymentStatus {
  Locked
  Released
  Refunded
}

type Payment @entity {
  id: ID! # requestId
  requestId: Bytes!
  agent: Bytes!
  provider: Bytes!
  amount: BigInt!
  hashLock: Bytes!
  deadline: BigInt!
  status: PaymentStatus!
  preimage: Bytes # Only set when released
  createdAt: BigInt!
  updatedAt: BigInt!
  txHash: Bytes!
  blockNumber: BigInt!
}
